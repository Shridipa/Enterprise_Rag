version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # ── Application ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rag_backend
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - API_KEY=${API_KEY:-}
    volumes:
      - temp_storage:/tmp
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: rag_worker
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - API_KEY=${API_KEY:-}
    volumes:
      - temp_storage:/tmp
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rag_frontend
    ports:
      - "8502:8501"
    environment:
      - API_BASE=http://backend:8000
      - API_KEY=${API_KEY:-}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_storage:
  temp_storage: